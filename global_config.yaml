# AndroScan global config. Optional; env vars override these values.
# Pass path via --config or place at repo root / config/global_config.yaml

ollama:
  base_url: "http://localhost:11434"
  timeout_sec: 150
  model: "qwen3.5:35b"
  temperature: 0.2
  num_predict: 8192

paths:
  run_folder_root: "apps"
  apktool_cmd: "apktool"
  jadx_cmd: "jadx"

workflow:
  max_turns: 5
  max_hypotheses_per_report: 10
  per_component_analysis: true

output:
  section_rule_char: "─"
  section_rule_length: 60
